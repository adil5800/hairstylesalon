apiVersion: apps/v1
kind: Deployment
metadata:
  name: hairstylesalon-deployment
  labels:
    app: hairstylesalon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hairstylesalon
  template:
    metadata:
      labels:
        app: hairstylesalon
    spec:
      containers:
      - name: hairstylesalon-container
        image: adil5800/hairstylesalon:v3   # your Docker Hub image
        ports:
        - containerPort: 80

---
 apiVersion: v1
 kind: Service
 metadata:
   name: hairstylesalon-service
 spec:
   type: ClusterIP
   selector:
     app: hairstylesalon
   ports:
   - port: 80
     targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hairstylesalon-ingress
  namespace: hairstylesalon
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
  - host: www.cyberrior.com
    http:
      paths:
      - path: /hairstylesalon(/|$)(.*)
      #- path: /hairstylesalon
        pathType: ImplementationSpecific
        #pathType: Prefix
        backend:
          service:
            name: hairstylesalon-service
            port:
              number: 80