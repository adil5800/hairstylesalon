apiVersion: apps/v1
kind: Deployment
metadata:
  name: hairstylesalon-deployment
  labels:
    app: hairstylesalon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hairstylesalon
  template:
    metadata:
      labels:
        app: hairstylesalon
    spec:
      containers:
      - name: hairstylesalon-container
        image: adil5800/hairstylesalon:v1   # your Docker Hub image
        ports:
        - containerPort: 80

---
 apiVersion: v1
 kind: Service
 metadata:
   name: hairstylesalon-service
 spec:
   type: ClusterIP
   selector:
     app: hairstylesalon
   ports:
   - port: 80
     targetPort: 80